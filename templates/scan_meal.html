<!DOCTYPE html>
<html>
<head>
    <title>Scan Meal</title>
</head>
<body>

    <h2>Scan Your Meal</h2>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="file"
            name="meal_image"
            accept="image/*"
            required>

        <button type="submit">
            Analyze Meal
        </button>

    </form>

</body>
</html>
