<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NutriLens</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<body>

    <div class="form-container">

        <div class="form-card">

            <h2>Create Account 🚀</h2>

            <p class="form-subtitle">
                Join NutriLens and start building healthier habits.
            </p>

            <form method="POST">

                <input
                    type="text"
                    name="full_name"
                    placeholder="Full Name"
                    required>

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

                <input
                    type="email"
                    name="email"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm Password"
                    required>

                <button type="submit">
                    Create Account
                </button>

            </form>

            <p>
                Already have an account?
                <a href="/login">Login</a>
            </p>

        </div>

    </div>

</body>
</html>
